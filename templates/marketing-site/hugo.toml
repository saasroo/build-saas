# =============================================================================
# Saasify Marketing Site — Starter Configuration
# Replace all {{PLACEHOLDER}} values with your product details.
# Full reference: skills/build-marketing-site/references/hugo-config.md
# =============================================================================

baseURL = "https://{{YOUR_DOMAIN}}"
title = "{{PRODUCT_NAME}}"
theme = "hugo-saasify-theme"

enableEmoji = true
enableGitInfo = true

[taxonomies]
  category = 'categories'
  tag = 'tags'

[pagination]
  pagerSize = 6
  path = "page"

[params]
  description = "{{ONE_LINE_DESCRIPTION}}"
  author = "{{COMPANY_NAME}}"
  logo = "/images/logo.svg"

  [params.social]
    # linkedin = "https://linkedin.com/company/{{COMPANY}}"
    # twitter = "https://twitter.com/{{HANDLE}}"
    # github = "https://github.com/{{ORG}}"

  [params.footer]
    column_1_title = "PRODUCT"
    column_2_title = "COMPANY"
    column_3_title = "LEGAL"

  [params.header]
    background = "bg-white/80 backdrop-blur-sm"
    border = "border-b border-gray-100"

    [params.header.logo]
      src = "/images/logo.svg"

    [params.header.menu]
      spacing = "space-x-8"

      [params.header.menu.dropdown]
        width = "w-72"
        container_padding = "py-6"
        item_padding = "px-8 py-3"
        background = "bg-white"
        border = "border border-gray-100"
        shadow = "shadow-xl"
        radius = "rounded-lg"
        text_color = "text-gray-700"
        hover_background = "hover:bg-gray-50"
        text_size = "text-sm"

    [params.header.buttons]
      [params.header.buttons.signIn]
        text = "Sign in"
        url = "/signin"
      [params.header.buttons.getStarted]
        text = "Get Started"
        url = "/get-started"

  [params.blog]
    enable = true
    title = "Latest Articles"
    subtitle = "Insights and updates from our team"

    [params.blog.cta]
      enable = true

    [params.blog.sidebar]
      [params.blog.sidebar.recent]
        enable = true
        count = 5
      [params.blog.sidebar.categories]
        enable = true
      [params.blog.sidebar.tags]
        enable = true
        count = 20

  [params.cta]
    enable = true
    title = "{{CTA_TITLE}}"
    description = "{{CTA_DESCRIPTION}}"
    gradient_from = "#2563eb"
    gradient_to = "#9333ea"
    gradient_angle = 30

    [params.cta.primary_button]
      text = "Get Started Free"
      url = "/get-started"
    [params.cta.secondary_button]
      text = "Book a Demo"
      url = "/demo"

[[menu.main]]
  name = "Features"
  weight = 1
  [menu.main.params]
    has_submenu = true
    submenu = [
      { name = "{{FEATURE_1}}", url = "/features/{{FEATURE_1_SLUG}}/" },
      { name = "{{FEATURE_2}}", url = "/features/{{FEATURE_2_SLUG}}/" },
      { name = "{{FEATURE_3}}", url = "/features/{{FEATURE_3_SLUG}}/" }
    ]

[[menu.main]]
  name = "Pricing"
  url = "/pricing"
  weight = 2

[[menu.main]]
  name = "Docs"
  url = "/docs"
  weight = 3

[[menu.main]]
  name = "Blog"
  url = "/blog"
  weight = 4

[[menu.main]]
  name = "Company"
  weight = 5
  [menu.main.params]
    has_submenu = true
    submenu = [
      { name = "About Us", url = "/company/" },
      { name = "Careers", url = "/careers/" }
    ]

[[menu.footer_column_1]]
  name = "{{FEATURE_1}}"
  url = "/features/{{FEATURE_1_SLUG}}/"
  weight = 1
[[menu.footer_column_1]]
  name = "{{FEATURE_2}}"
  url = "/features/{{FEATURE_2_SLUG}}/"
  weight = 2
[[menu.footer_column_1]]
  name = "{{FEATURE_3}}"
  url = "/features/{{FEATURE_3_SLUG}}/"
  weight = 3

[[menu.footer_column_2]]
  name = "Blog"
  url = "/blog"
  weight = 1
[[menu.footer_column_2]]
  name = "About Us"
  url = "/company"
  weight = 2
[[menu.footer_column_2]]
  name = "Careers"
  url = "/careers"
  weight = 3

[[menu.footer_column_3]]
  name = "Privacy Policy"
  url = "/privacy"
  weight = 1
[[menu.footer_column_3]]
  name = "Terms of Service"
  url = "/terms"
  weight = 2

[module]
  [module.hugoVersion]
    extended = true
    min = "0.80.0"

[build]
  writeStats = true

[build.buildStats]
  enable = true

[security.funcs]
  getenv = ['^HUGO_', '^CI$']

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    codeFences = true
    guessSyntax = true
    lineNumbersInTable = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2
